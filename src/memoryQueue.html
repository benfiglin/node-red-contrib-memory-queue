<!-- configuration -->
<script type="text/javascript">
  RED.nodes.registerType('memory-queue',{
      category: 'config',
      defaults: {
        name: { value: '', required: true },
        size: { value: null, required: false },
        discard: { value: false, required: false },
        onFull: { value: 'reject', required: false },
        emitOnStart: { value: true, required: false },
        persistent: { value: false, required: false },
        dir: { value: '', required: false },
        durability: { value: 'balanced', required: false },
        flushIntervalMs: { value: 2000, required: false },
      },
      label: function() {
          return this.name;
      },
      oneditprepare: function() {
        $("#node-config-input-size").typedInput({
          type:'num'
        })

        $("#node-config-input-flushIntervalMs").typedInput({
          type:'num'
        })

        const updatePersistentFields = function () {
          const enabled = $("#node-config-input-persistent").prop('checked');
          $(".memqueue-persistent").toggle(enabled);
        }

        $("#node-config-input-persistent").on('change', updatePersistentFields);

        if (!this.onFull) {
          this.onFull = this.discard ? 'discard_oldest' : 'reject'
        }

        if (!this.durability) {
          this.durability = 'balanced'
        }

        if (typeof this.emitOnStart !== 'boolean') {
          this.emitOnStart = true
        }

        updatePersistentFields();
      }
  });

  
</script>

<script type="text/html" data-template-name="memory-queue">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name">
  </div>
  <div class="form-row">
    <label for="node-config-input-size"><i class="fa fa-database"></i> Size</label>
    <input type="text" id="node-config-input-size">
  </div>
  <div class="form-row">
    <label for="node-config-input-onFull"><i class="fa fa-tasks"></i> On Full</label>
    <select id="node-config-input-onFull">
      <option value="reject">Reject New</option>
      <option value="discard_oldest">Discard Oldest</option>
      <option value="discard_newest">Discard Newest</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-emitOnStart"><i class="fa fa-play"></i> Emit head on start</label>
    <input type="checkbox" id="node-config-input-emitOnStart" style="display:inline-block; width:auto; vertical-align:top;">
  </div>
  <div class="form-row">
    <label for="node-config-input-persistent"><i class="fa fa-save"></i> Persistent</label>
    <input type="checkbox" id="node-config-input-persistent" style="display:inline-block; width:auto; vertical-align:top;">
  </div>
  <div class="form-row memqueue-persistent">
    <label for="node-config-input-dir"><i class="fa fa-folder-open"></i> Directory</label>
    <input type="text" id="node-config-input-dir" placeholder="(default: under Node-RED userDir)">
  </div>
  <div class="form-row memqueue-persistent">
    <label for="node-config-input-durability"><i class="fa fa-shield"></i> Durability</label>
    <select id="node-config-input-durability">
      <option value="balanced">Balanced</option>
      <option value="strict">Strict</option>
    </select>
  </div>
  <div class="form-row memqueue-persistent">
    <label for="node-config-input-flushIntervalMs"><i class="fa fa-clock-o"></i> Flush Interval (ms)</label>
    <input type="text" id="node-config-input-flushIntervalMs">
  </div>
  </script>
